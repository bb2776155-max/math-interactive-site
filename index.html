<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>把书读厚后 - 思维化的数学讲解</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 transition-all duration-500 backdrop-blur-md">
        <div class="max-w-md w-full px-8 py-10 bg-slate-900/40 border border-slate-800/60 rounded-2xl text-center shadow-2xl shadow-indigo-500/5">
            <div class="w-12 h-12 bg-indigo-600/10 border border-indigo-500/20 rounded-xl flex items-center justify-center mx-auto mb-4">
                <span class="text-xl font-black text-indigo-400">∑</span>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-white mb-2">数学思维</h1>
            <p class="text-slate-400 text-xs mb-8">请输入您的邀请码解锁</p>
            <div class="relative">
                <input type="password" id="invite-code-input" placeholder="ENTER INVITE CODE..."
                       class="w-full bg-slate-950/80 border border-slate-800 rounded-xl px-4 py-3.5 text-white placeholder-slate-700 focus:outline-none focus:border-indigo-500 font-mono tracking-widest text-center transition-all text-sm focus:ring-1 focus:ring-indigo-500/20">
                <p id="login-error" class="text-rose-400 text-xs mt-3 hidden">邀请码无效或已过期，请联系教研室</p>
            </div>
            <button onclick="handleLogin()" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-3.5 px-4 rounded-xl transition-all cursor-pointer shadow-lg shadow-indigo-600/10 h-11 flex items-center justify-center">
                验 证 并 登 录
            </button>
        </div>
    </div>

    <div id="main-content" class="flex-grow flex opacity-0 h-screen overflow-hidden transition-opacity duration-500 pointer-events-none">
        <aside class="w-85 bg-slate-900/40 border-r border-slate-900 flex flex-col shrink-0">
            <div class="p-5 border-b border-slate-900 space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <span class="text-base font-black tracking-wider bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">把书读厚</span>
                        <span class="text-[10px] bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-1.5 py-0.5 rounded font-mono">v4.1</span>
                    </div>
                    <button onclick="handleLogout()" title="锁定系统并退出" class="text-slate-500 hover:text-rose-400 transition-colors p-1.5 rounded-lg hover:bg-slate-950 cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </button>
                </div>
                <div class="relative">
                    <input type="text" id="search-input" oninput="handleFilterChange()" placeholder="搜索题干、正文或输入标签(如:对称)..."
                           class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
                    <div class="absolute left-3 top-2.5 text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                </div>
                <div id="filter-status-box" class="hidden items-center justify-between bg-indigo-500/5 border border-indigo-500/10 rounded-lg px-3 py-1.5 text-[11px]">
                    <span class="text-indigo-400 truncate max-w-[150px]" id="filter-status-text"></span>
                    <button onclick="clearTagFilter()" class="text-slate-500 hover:text-slate-300 font-bold cursor-pointer">清除 ×</button>
                </div>
            </div>
            <nav id="lesson-list" class="flex-grow overflow-y-auto p-4 space-y-2"></nav>
        </aside>

        <main class="flex-grow overflow-y-auto bg-slate-950 px-8 py-10">
            <div class="max-w-3xl mx-auto space-y-6">

                <div id="announcement-banner" class="bg-slate-900/30 border border-slate-900 rounded-2xl p-5 space-y-2">
                    <div class="text-xs font-black tracking-widest text-slate-500 uppercase flex items-center space-x-2">
                        <span>📢 学习观公告</span>
                    </div>
                    <p class="text-xs text-slate-400 leading-relaxed font-medium">
                        本站的文字啰唆而清晰，是为了把核心思路尽量完整、无损地传达给你，帮你真正把书“读厚”。<span class="text-indigo-400 font-semibold">你不需要也绝不应该尝试一口气看完一整章</span>，每次集中注意力阅读 10～20 分钟即可。请按照你自己的思维节奏，静下心来慢慢内化。
                    </p>
                </div>

                <div id="history-resume-banner" class="hidden items-center justify-between bg-indigo-500/5 border border-indigo-500/10 rounded-xl px-5 py-3 text-xs animate-fade-in">
                    <div class="flex items-center space-x-2 text-slate-400">
                        <span>📍</span>
                        <span>上次读到：<strong id="history-lesson-title" class="text-slate-200 font-bold"></strong></span>
                    </div>
                    <button onclick="resumeLastRead()" class="text-indigo-400 hover:text-indigo-300 font-bold cursor-pointer transition-colors">点击回位 →</button>
                </div>

                <header class="border-b border-slate-900 pb-5 flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
                    <div class="space-y-3">
                        <h1 id="lesson-title" class="text-2xl font-extrabold text-white tracking-tight leading-snug"></h1>
                        <div id="tag-container" class="flex flex-wrap gap-2 text-[11px] font-semibold"></div>
                    </div>
                    <div class="shrink-0 flex items-center gap-3">
                        <button id="review-mode-btn" onclick="toggleReviewMode()" class="cursor-pointer text-xs font-bold px-3 py-2 rounded-xl border border-slate-800 bg-slate-900 text-slate-400 hover:text-slate-200 transition-all flex items-center space-x-1.5">
                            <span id="review-status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                            <span id="review-btn-text">复习模式：关闭</span>
                        </button>
                        <button id="status-toggle-btn" onclick="toggleLessonStatus()" class="cursor-pointer text-xs font-bold px-4 py-2 rounded-xl border flex items-center space-x-2 transition-all"></button>
                    </div>
                </header>

                <section id="steps-container" class="space-y-4 desert-flow tex2jax_process"></section>

                <section class="border-t border-slate-900 pt-8 space-y-5">
                    <div class="bg-slate-900/20 border border-slate-900/60 rounded-xl p-5 space-y-3">
                        <h3 class="text-xs font-black tracking-wider text-slate-400 uppercase">🧠 评论区</h3>
                    </div>
                    <div id="comments-flow" class="space-y-4"></div>
                    <div class="flex gap-3 items-start">
                        <textarea id="comment-input" rows="3" placeholder="你可以说这个题用了哪些方法，你也可以简述这个题的思维和解答步骤..."
                                  class="flex-grow bg-slate-900/40 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-700 focus:outline-none focus:border-indigo-500 resize-none transition-colors"></textarea>
                        <button onclick="submitComment()" class="shrink-0 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs py-3 px-5 rounded-xl transition-all cursor-pointer shadow-lg shadow-indigo-600/10 h-11 flex items-center justify-center">
                            记录心得
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="lessons.js"></script>
    <script src="auth.js"></script>
    <script src="storage.js"></script>
    <script src="comments.js"></script>
    <script src="app.js"></script>
</body>
</html>
